name: mobile_app
description: Turk Dunyosi Ayol Ijodkorlari - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Localization
  easy_localization: ^3.0.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.2

  # Dependency Injection
  get_it: ^7.6.4

  # Navigation
  go_router: ^12.1.1

  # Functional Programming
  dartz: ^0.10.1

  # Media
  video_player: ^2.7.2
  audioplayers: ^5.2.1

  # Image
  cached_network_image: ^3.3.0

  # File Picker
  file_picker: ^8.0.0

  # Secure Key Storage (Hive encryption key uchun)
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
